<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Estudia tus mazos de Anki de japonés en Meta Ray-Ban Display">
<meta name="mrbd-web-app-capable" content="yes">
<title>Anki Gafas</title>
<link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=">
<style>
  :root{
    --bg:#000000;
    --fg:#eafcff;
    --accent:#00d4ff;
    --accent-dim:#0a3540;
    --again:#ff4d4d;
    --hard:#ffa64d;
    --good:#4dff88;
    --easy:#4da6ff;
    --dim:#7fb8c2;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    width:600px;height:600px;
    background:var(--bg);
    color:var(--fg);
    overflow:hidden;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  }
  #app{width:600px;height:600px;position:relative;}
  .screen{
    position:absolute;top:0;left:0;width:600px;height:600px;
    display:none;flex-direction:column;
    padding:20px;
  }
  .screen.active{display:flex;}

  h1{font-size:26px;margin:0 0 4px;color:var(--accent);font-weight:600;letter-spacing:.5px;}
  .subtitle{font-size:15px;color:var(--dim);margin:0 0 14px;}

  .list{flex:1;display:flex;flex-direction:column;gap:8px;overflow:hidden;}

  .focusable{
    transition:all 120ms ease;
    border:2px solid rgba(255,255,255,.15);
    border-radius:10px;
    min-height:60px;
    background:rgba(255,255,255,.03);
    color:var(--fg);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    font-size:18px;
    cursor:pointer;
  }
  .focusable:focus{
    outline:none;
    border-color:var(--accent);
    background:var(--accent-dim);
    box-shadow:0 0 18px rgba(0,212,255,.45);
  }
  .deck-name{font-weight:600;}
  .deck-count{font-size:13px;color:var(--dim);}
  .focusable:focus .deck-count{color:var(--accent);}

  .hint{margin-top:10px;font-size:13px;color:var(--dim);text-align:center;}

  /* ---- study screen ---- */
  #study{padding:16px;}
  .study-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--dim);margin-bottom:8px;}
  .progress-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:14px;}
  .progress-fill{height:100%;background:var(--accent);width:0%;transition:width 200ms ease;}

  .card-area{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:10px;
    overflow:hidden;
  }
  .card-front{font-size:40px;font-weight:700;line-height:1.2;word-break:break-word;}
  .card-sub{font-size:20px;color:var(--accent);}
  .card-back{font-size:26px;color:var(--good);font-weight:600;margin-top:6px;}
  .card-example{font-size:16px;color:var(--dim);margin-top:8px;}
  .card-example-back{font-size:14px;color:var(--dim);}

  .listen-btn{
    margin-top:10px;width:52px;height:52px;border-radius:50%;
    font-size:22px;
  }

  .reveal-row{display:flex;justify-content:center;margin-top:6px;}
  .reveal-btn{width:220px;min-height:64px;justify-content:center;font-size:19px;font-weight:600;}

  .grade-row{display:flex;gap:8px;margin-top:6px;}
  .grade-btn{
    flex:1;flex-direction:column;justify-content:center;align-items:center;
    min-height:74px;padding:8px 4px;gap:2px;
  }
  .grade-label{font-size:16px;font-weight:700;}
  .grade-interval{font-size:12px;color:var(--dim);}
  .grade-again .grade-label{color:var(--again);}
  .grade-hard .grade-label{color:var(--hard);}
  .grade-good .grade-label{color:var(--good);}
  .grade-easy .grade-label{color:var(--easy);}
  .grade-btn:focus .grade-interval{color:var(--fg);}

  .back-btn{
    align-self:flex-start;margin-bottom:6px;
    min-height:44px;padding:0 14px;font-size:14px;
  }

  .done-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;}
  .done-box .big{font-size:60px;}
  .done-box .msg{font-size:20px;color:var(--accent);}
  .done-box .stat{font-size:14px;color:var(--dim);}
</style>
</head>
<body>
<div id="app">

  <!-- MENU: choice of deck -->
  <div class="screen active" id="menu">
    <h1>先生 Anki Sensei</h1>
    <div class="subtitle">Elige un mazo para estudiar</div>
    <button class="focusable" id="audio-test-btn" data-action="test-audio" style="margin-bottom:8px;">
      <span class="deck-name">🔊 Probar / activar audio</span><span class="deck-count" id="audio-status">toca aquí primero</span>
    </button>
    <div class="list" id="deck-list"></div>
    <div class="hint">Neural Band: arriba/abajo · pellizco índice = Enter · el pellizco medio abre el menú de Meta, no "volver"</div>
  </div>

  <!-- SUBMENU: temas of Minna no Nihongo -->
  <div class="screen" id="submenu">
    <button class="focusable back-btn" id="submenu-back" data-action="back">‹ Mazos</button>
    <h1 style="font-size:20px;">Minna no Nihongo I</h1>
    <div class="subtitle">Elige un tema</div>
    <div class="list" id="tema-list"></div>
  </div>

  <!-- STUDY -->
  <div class="screen" id="study">
    <button class="focusable back-btn" id="study-back" data-action="back">‹ Menú</button>
    <div class="study-top">
      <span id="deck-title-label">Mazo</span>
      <span id="counter-label">0 / 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

    <div class="card-area" id="card-area">
      <div class="card-front" id="card-front">…</div>
      <div class="card-sub" id="card-sub"></div>
      <div class="card-back" id="card-back" style="display:none;"></div>
      <div class="card-example" id="card-example" style="display:none;"></div>
      <div class="card-example-back" id="card-example-back" style="display:none;"></div>
      <button class="focusable listen-btn" id="listen-btn" data-action="listen">🔊</button>
    </div>

    <div class="reveal-row" id="reveal-row">
      <button class="focusable reveal-btn" id="reveal-btn" data-action="reveal" data-default-focus="true">Mostrar respuesta</button>
    </div>

    <div class="grade-row" id="grade-row" style="display:none;">
      <button class="focusable grade-btn grade-again" data-grade="1"><span class="grade-label">Otra vez</span><span class="grade-interval" id="int-1"></span></button>
      <button class="focusable grade-btn grade-hard" data-grade="2"><span class="grade-label">Difícil</span><span class="grade-interval" id="int-2"></span></button>
      <button class="focusable grade-btn grade-good" data-grade="3" data-default-focus="true"><span class="grade-label">Bien</span><span class="grade-interval" id="int-3"></span></button>
      <button class="focusable grade-btn grade-easy" data-grade="4"><span class="grade-label">Fácil</span><span class="grade-interval" id="int-4"></span></button>
    </div>
  </div>

  <!-- DONE -->
  <div class="screen" id="done">
    <div class="done-box">
      <div class="big">✅</div>
      <div class="msg">¡Sesión completada!</div>
      <div class="stat" id="done-stat"></div>
      <button class="focusable back-btn" id="done-back" data-action="back" style="align-self:center;min-height:56px;padding:0 20px;font-size:16px;">‹ Volver a mazos</button>
    </div>
  </div>

</div>

<script src="https://js.puter.com/v2/"></script>
<script src="data.js"></script>
<audio id="tts-audio" preload="none" style="display:none;"></audio>
<script src="app.js"></script>
</body>
</html>
